<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注視</title>
<!--
  ══════════════════════════════════════════════
  偽3D 恐怖 Mockup《注視》v0.1
  管線:3D 點雲 → 旋轉 → 光照(法線·光向) → z-buffer → 字符亮度階。
  （與迴旋體同一條管線——甜甜圈只是示範品，點雲換成什麼都行。）

  恐怖三招:
  一、亮度階本身是死亡的字:　・冫亡幽骨死屍靈——
      遠看是立體明暗，湊近看，受光最亮的顴骨全是「死」「靈」。
      公理二（語義即物質）的恐怖版推論。
  二、眼睛追蹤:眼窩深處兩點紅光跟著滑鼠移動。
      「面具」模式永遠追;「骷髏」模式呼吸般忽明忽暗地追。
  三、面向減速:自轉轉到正對觀者時放慢——
      像特地停下來看你一眼，再轉走。

  打開後預期看到:
  1. 一顆由字符構成的頭顱緩緩自轉（眼窩黑洞、鼻腔、交錯的牙）。
  2. 移動滑鼠——眼窩裡的紅點跟著你。
  3. 每 3~7 秒一次單幀故障:隨機格子被「骨」「死」污染、
     畫面紅閃並抖動一下。
  4. 周圍低語緩緩浮現又淡去（別看太久／它記得你的游標⋯）。
  5. 上方按鈕切換「骷髏 / 面具」:面具無牙、眼窩淺、紅眼常亮緊追。
  6. 系統開啟「減少動態」時:自轉極慢、故障與低語停用。

  延伸:同管線可吃任何點雲——把高度圖/簡化模型轉成點陣列即可
  渲染任何形狀;亮度階換字＝換材質（骨/水/鏽/花）。
  ══════════════════════════════════════════════
-->
<style>
  :root{ --paper:#e9e4d6; --faint:#5b6784; --blood:#a83232; }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{ margin:0; overflow:hidden; background:#050407; color:var(--paper);
    font-family:Georgia,'Noto Serif TC','PMingLiU',serif; user-select:none;
    cursor:crosshair; }

  #glow{ position:fixed; left:50%; top:52%; width:70vmin; height:70vmin;
    transform:translate(-50%,-50%); pointer-events:none;
    background:radial-gradient(circle, rgba(90,20,20,.16), transparent 65%);
    animation:pulse 7s ease-in-out infinite; }
  @keyframes pulse{ 50%{ opacity:.45; } }

  #skullPre{ position:fixed; left:50%; top:52%;
    transform:translate(-50%,-50%); margin:0;
    font-family:'Noto Sans Mono CJK TC','MingLiU','MS Gothic',monospace;
    line-height:1.02; letter-spacing:0; color:#b9b4a8;
    text-shadow:0 0 10px rgba(150,140,120,.12); }
  #skullPre.glitch{ transform:translate(calc(-50% + 3px),calc(-50% - 2px));
    color:#c8b8b8; text-shadow:0 0 12px rgba(168,50,50,.5); }

  .eye{ position:fixed; width:7px; height:7px; border-radius:50%;
    background:var(--blood); pointer-events:none;
    box-shadow:0 0 10px rgba(168,50,50,.9), 0 0 22px rgba(168,50,50,.5);
    transform:translate(-50%,-50%); transition:opacity .8s; }

  #mode{ position:fixed; top:16px; left:50%; transform:translateX(-50%);
    z-index:20; display:flex; gap:8px; }
  #mode button{ cursor:pointer; font:12px 'Noto Serif TC',serif;
    letter-spacing:.2em; color:var(--faint); background:rgba(10,8,14,.7);
    border:1px solid rgba(147,160,191,.2); border-radius:8px; padding:7px 16px; }
  #mode button.on{ color:#c9a7a7; border-color:rgba(168,50,50,.5); }

  .whisper{ position:fixed; z-index:15; font-size:12px; letter-spacing:.4em;
    color:rgba(147,160,191,.0); pointer-events:none;
    transition:color 4s ease; writing-mode:vertical-rl; }
  .whisper.show{ color:rgba(147,160,191,.35); }

  #note{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    font:10px 'Courier New',monospace; letter-spacing:.2em; color:#2e3442; }
</style>
</head>
<body>
<div id="glow"></div>
<pre id="skullPre"></pre>
<div class="eye" id="eyeL"></div>
<div class="eye" id="eyeR"></div>
<div id="mode">
  <button id="mSkull" class="on">骷髏</button>
  <button id="mMask">面具</button>
</div>
<div id="note">湊近看——亮的地方是什麼字。</div>

<script>
'use strict';
const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ══ 亮度階＝死亡的字（全形等寬）══ */
const RAMP = [...'　・冫亡幽骨死屍靈'];

/* ══ 頭顱點雲（模型空間，+z 朝觀者，y 向下）══ */
const POINTS = [];
(function build() {
  for (let th = 0.05; th < Math.PI; th += 0.055) {        // 緯度
    for (let ph = 0; ph < Math.PI * 2; ph += 0.055) {     // 經度
      const sx = Math.sin(th) * Math.cos(ph);
      const sy = Math.cos(th);
      const sz = Math.sin(th) * Math.sin(ph);
      // 顱型:略高、後腦略扁、下顎收窄
      let x = sx, y = -sy * 1.12, z = sz * 0.96;
      if (y > 0.3) x *= 1 - (y - 0.3) * 0.45;             // 下顎收窄
      if (y > 0.3) z *= 1 - (y - 0.3) * 0.25;
      POINTS.push({ x, y, z, nx: sx, ny: -sy, nz: sz });
    }
  }
})();

/* 特徵區判定（模型空間方向）*/
const SOCKET = [{ x: -0.34, y: -0.16, z: 0.92 }, { x: 0.34, y: -0.16, z: 0.92 }]
  .map(v => { const m = Math.hypot(v.x, v.y, v.z);
              return { x: v.x / m, y: v.y / m, z: v.z / m }; });
function feature(p, mode) {
  const m = Math.hypot(p.nx, p.ny, p.nz) || 1;
  const d = { x: p.nx / m, y: p.ny / m, z: p.nz / m };
  for (const s of SOCKET) {
    const dot = d.x * s.x + d.y * s.y + d.z * s.z;
    if (dot > (mode === 'mask' ? 0.982 : 0.966)) return 'hole';   // 眼窩
  }
  if (Math.abs(p.x) < 0.10 && p.y > 0.02 && p.y < 0.24 && p.z > 0.82)
    return 'hole';                                                 // 鼻腔
  if (p.y > 0.42 && p.y < 0.60 && p.z > 0.70) {
    if (mode === 'mask') return p.y > 0.49 && p.y < 0.53 ? 'hole' : null; // 面具:一線嘴
    return Math.floor((p.x + 2) * 7.5) % 2 ? 'tooth' : 'gap';      // 骷髏:交錯的牙
  }
  return null;
}

/* ══ 渲染 ══ */
const W = 46, H = 26, K = 2.6;                 // 網格與縮放
const pre = document.getElementById('skullPre');
pre.style.fontSize =
  Math.max(9, Math.min(19, Math.floor(Math.min(innerWidth / W / 2, innerHeight / H / 1.4)))) + 'px';

const LIGHT = (() => { const v = { x: -0.35, y: -0.5, z: 0.8 };
  const m = Math.hypot(v.x, v.y, v.z);
  return { x: v.x / m, y: v.y / m, z: v.z / m }; })();

let A = 0.4;                                   // 繞 Y 軸角
let mode = 'skull';
let mouse = { x: 0, y: 0 };
addEventListener('pointermove', e => {
  mouse.x = e.clientX / innerWidth * 2 - 1;
  mouse.y = e.clientY / innerHeight * 2 - 1;
});

let glitchCells = null;
function frame(now) {
  /* 面向觀者時減速:cos(A)≈1（正臉）時速度掉到 22% */
  const face = Math.cos(A);
  const speed = (reduced ? 0.002 : 0.012) * (1 - Math.max(0, face) * 0.78);
  A += speed;

  const cA = Math.cos(A), sA = Math.sin(A);
  const buf = new Array(W * H).fill(0);
  const zb  = new Array(W * H).fill(-1e9);

  for (const p of POINTS) {
    const rx = p.x * cA + p.z * sA;            // 繞 Y 旋轉
    const rz = -p.x * sA + p.z * cA;
    const ry = p.y;
    if (rz < -0.15) continue;                  // 背面粗剔除
    const gx = Math.floor(W / 2 + rx * W * 0.36);
    const gy = Math.floor(H / 2 + ry * H * 0.40);
    if (gx < 0 || gx >= W || gy < 0 || gy >= H) continue;
    const o = gx + W * gy;
    if (rz <= zb[o]) continue;
    zb[o] = rz;

    const f = feature(p, mode);
    if (f === 'hole' || f === 'gap') { buf[o] = 1; continue; }     // 深洞＝最暗
    if (f === 'tooth') { buf[o] = RAMP.length - 2; continue; }     // 牙＝亮

    const nx = p.nx * cA + p.nz * sA;          // 法線同旋轉
    const nz = -p.nx * sA + p.nz * cA;
    let lum = nx * LIGHT.x + p.ny * LIGHT.y + nz * LIGHT.z;
    lum = Math.max(0, lum);
    buf[o] = Math.max(1, Math.min(RAMP.length - 1,
      1 + Math.floor(lum * (RAMP.length - 1))));
  }

  /* 單幀故障 */
  if (glitchCells) {
    for (const [o, ch] of glitchCells) buf[o] = ch;
  }

  let out = '';
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) out += RAMP[buf[x + W * y]];
    out += '\n';
  }
  pre.textContent = out;

  /* ══ 紅眼追蹤 ══ */
  const preR = pre.getBoundingClientRect();
  SOCKET.forEach((s, i) => {
    const ex = s.x * cA + s.z * sA;
    const ez = -s.x * sA + s.z * cA;
    const eye = document.getElementById(i === 0 ? 'eyeL' : 'eyeR');
    if (ez < 0.35) { eye.style.opacity = '0'; return; }            // 側/背面看不到
    const px = preR.left + preR.width  * (0.5 + ex  * 0.345)
             + mouse.x * 5;                                        // 追著你
    const py = preR.top  + preR.height * (0.5 + s.y * 0.40)
             + mouse.y * 4;
    eye.style.left = px + 'px'; eye.style.top = py + 'px';
    const breathe = mode === 'mask'
      ? 1
      : 0.35 + 0.65 * Math.abs(Math.sin(now / 1700));             // 骷髏:呼吸般忽明忽暗
    eye.style.opacity = String((ez - 0.3) * 1.4 * breathe);
  });

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ══ 故障排程 ══ */
function scheduleGlitch() {
  setTimeout(() => {
    if (!reduced) {
      glitchCells = Array.from({ length: 26 }, () => [
        Math.floor(Math.random() * W * H),
        Math.random() < 0.5 ? RAMP.length - 3 : RAMP.length - 4    // 骨/死
      ]);
      pre.classList.add('glitch');
      setTimeout(() => { glitchCells = null; pre.classList.remove('glitch'); },
        90 + Math.random() * 120);
    }
    scheduleGlitch();
  }, 3000 + Math.random() * 4000);
}
scheduleGlitch();

/* ══ 低語 ══ */
const WHISPERS = ['別看太久', '它記得你的游標', '亮的地方都是死', '轉過來的時候不要動'];
function whisperLoop() {
  setTimeout(() => {
    if (!reduced) {
      const w = document.createElement('div');
      w.className = 'whisper';
      w.textContent = WHISPERS[Math.floor(Math.random() * WHISPERS.length)];
      w.style.left = (8 + Math.random() * 84) + 'vw';
      w.style.top  = (12 + Math.random() * 60) + 'vh';
      document.body.appendChild(w);
      requestAnimationFrame(() => w.classList.add('show'));
      setTimeout(() => w.classList.remove('show'), 4200);
      setTimeout(() => w.remove(), 8600);
    }
    whisperLoop();
  }, 5000 + Math.random() * 6000);
}
whisperLoop();

/* ══ 模式切換 ══ */
const bS = document.getElementById('mSkull');
const bM = document.getElementById('mMask');
bS.onclick = () => { mode = 'skull'; bS.classList.add('on'); bM.classList.remove('on'); };
bM.onclick = () => { mode = 'mask';  bM.classList.add('on'); bS.classList.remove('on'); };
</script>
</body>
</html>
