<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>幾何劇場 · 過場演出</title>
<!--
  ══════════════════════════════════════════════
  幾何劇場 Geometric Theatre · 過場演出 demo v0.1
  依據：Geometric Performance Codex v0.3
  角色＝符號棋子（○☆□），演技＝codex 旗鈕與動作：
    彈跳走＝輕盈/開心 · 滑行＝魅力（完美平滑本身就是警訊）
    機械步＝白格從不呼吸、等速直線 · 顫抖＝張力
    倒地＝壞死（傾倒＋紅色＋碎片噴濺）→ 遺忘之點
    鏡頭：處決時舞台推近（鏡頭軸 7.1-E）
  對話：氣泡出現在角色頭上——位置即說話者，不用名牌
  ⚠ 劇本為原創佔位（犯罪幾何角色原型），待作者重寫。
  操作：點擊開始 → 自動播放；播放中點擊＝暫停。
  ══════════════════════════════════════════════
-->
<style>
  :root{
    --bg0:#0b0a10; --bg1:#141222;
    --paper:#e9e4d6; --muted:#93a0bf; --faint:#5b6784;
    --warm:#ffb347; --cold:#9fd8ff; --blood:#d9534f;
    --line:rgba(147,160,191,.14);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; overflow:hidden; color:var(--paper);
    font-family:Georgia,'Noto Serif TC','PMingLiU',serif;
    background:linear-gradient(180deg,var(--bg0),var(--bg1));
    user-select:none;
  }
  #cover{
    position:fixed; inset:0; z-index:50; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:16px;
    background:linear-gradient(180deg,var(--bg0),var(--bg1));
    transition:opacity 1.4s; cursor:pointer;
  }
  #cover.gone{opacity:0; pointer-events:none}
  #cover h1{margin:0; font-size:30px; font-weight:600; letter-spacing:.34em; text-indent:.34em}
  #cover .sub{font:11px 'Courier New',monospace; letter-spacing:.28em; color:var(--faint)}
  #cover .go{font-size:12px; color:var(--muted); letter-spacing:.2em; animation:blink 2s infinite}
  @keyframes blink{0%,100%{opacity:.25}50%{opacity:.9}}

  /* 舞台 */
  #stageBox{
    position:fixed; left:50%; top:46%; transform:translate(-50%,-50%);
    width:min(94vw,640px); aspect-ratio:16/10;
  }
  #stage{
    position:absolute; inset:0; overflow:hidden;
    border:1px solid var(--line); border-radius:14px;
    background:
      radial-gradient(1px 1px at 20% 30%, rgba(147,160,191,.25), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(147,160,191,.2), transparent),
      radial-gradient(1px 1px at 45% 80%, rgba(147,160,191,.18), transparent),
      repeating-linear-gradient(0deg, transparent 0 39px, rgba(147,160,191,.045) 39px 40px),
      repeating-linear-gradient(90deg, transparent 0 39px, rgba(147,160,191,.045) 39px 40px),
      rgba(16,13,28,.5);
    transition:transform 1.6s cubic-bezier(.3,.1,.2,1);
    transform-origin:50% 55%;
  }
  #stage.zoom{transform:scale(1.16)}

  /* 角色：外層管走位、內層管演技 */
  .actor{
    position:absolute; width:0; height:0; z-index:20;
  }
  .actor .body{
    position:absolute; left:0; top:0; transform:translate(-50%,-50%);
    display:flex; flex-direction:column; align-items:center; gap:2px;
    transition:filter 1.5s, opacity 1.5s;
  }
  .actor .sym{
    font-size:27px; line-height:1;
    transition:transform .6s, color 1.5s, text-shadow 1s;
  }
  .actor .nm{
    font:9.5px 'Courier New',monospace; letter-spacing:.2em; color:var(--faint);
  }
  .breath .sym{animation:brth 3.8s ease-in-out infinite}
  @keyframes brth{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
  .breath-fast .sym{animation:brth 1.1s ease-in-out infinite}
  .hop .sym{animation:hop .4s ease-in-out infinite}
  @keyframes hop{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .trem .sym{animation:trm .14s steps(2) infinite}
  @keyframes trm{0%{transform:translate(0,0)}50%{transform:translate(1px,-.8px)}100%{transform:translate(-.8px,.6px)}}
  .dead .sym{
    transform:rotate(84deg) translateX(3px); color:#6a6e7c !important;
    text-shadow:none !important; animation:none;
  }
  .dead .nm{opacity:.4}

  /* 血與碎片（壞死：紅色＋碎片噴濺） */
  .shard{
    position:absolute; z-index:18; font-size:9px; pointer-events:none;
    animation:fly 1s cubic-bezier(.2,.6,.5,1) forwards;
  }
  @keyframes fly{
    0%{transform:translate(0,0); opacity:1}
    100%{transform:translate(var(--dx),var(--dy)); opacity:0}
  }
  .pool{
    position:absolute; z-index:10; width:34px; height:14px; border-radius:50%;
    background:radial-gradient(closest-side, rgba(217,83,79,.5), transparent);
    transform:translate(-50%,-30%) scale(0);
    transition:transform 1.6s ease, opacity 4s ease;
  }
  .pool.on{transform:translate(-50%,-30%) scale(1)}
  .pool.fade{opacity:0}
  .memdot{
    position:absolute; z-index:11; color:var(--faint); font-size:10px;
    transform:translate(-50%,-50%); opacity:0; transition:opacity 2.5s;
  }
  .memdot.on{opacity:.85}

  /* 對話氣泡：出現在角色頭上——位置即說話者 */
  .bub{
    position:absolute; z-index:30; transform:translate(-50%,-100%);
    max-width:200px; padding:7px 12px; border-radius:11px;
    background:rgba(20,16,34,.92); border:1px solid var(--line);
    font-size:13px; line-height:1.55; letter-spacing:.03em;
    opacity:0; transition:opacity .35s;
  }
  .bub.on{opacity:1}
  .bub::after{
    content:''; position:absolute; left:50%; bottom:-5px; transform:translateX(-50%) rotate(45deg);
    width:8px; height:8px; background:rgba(20,16,34,.92);
    border-right:1px solid var(--line); border-bottom:1px solid var(--line);
  }
  .bub.mech{
    font-family:'Courier New',monospace; font-size:12px; letter-spacing:.1em;
    border-radius:2px; color:var(--muted);
  }
  .bub.mech::after{border-radius:0}

  #caption{
    position:fixed; left:50%; bottom:52px; transform:translateX(-50%);
    width:min(92vw,600px); text-align:center; z-index:20;
    font-size:14.5px; letter-spacing:.08em; color:var(--muted);
    min-height:44px; transition:opacity .8s;
  }
  #foot{
    position:fixed; left:50%; bottom:14px; transform:translateX(-50%);
    font:10px 'Courier New',monospace; letter-spacing:.2em; color:var(--faint);
    display:flex; gap:20px; z-index:20;
  }
  #btnReplay{
    display:none; cursor:pointer; font:inherit; color:var(--muted);
    background:transparent; border:1px solid var(--line); border-radius:6px; padding:4px 12px;
  }
  #btnReplay.show{display:inline-block}
  @media (prefers-reduced-motion:reduce){
    .breath .sym,.breath-fast .sym,.hop .sym,.trem .sym{animation:none}
  }
</style>
</head>
<body>

<div id="cover">
  <h1>幾何劇場</h1>
  <div class="sub">GEOMETRIC THEATRE · 過場演出 DEMO</div>
  <div class="go">點擊開始</div>
</div>

<div id="stageBox"><div id="stage"></div></div>
<div id="caption"></div>

<div id="foot">
  <span id="pauseTip">自動播放 · 點擊暫停</span>
  <button id="btnReplay">↺ 重演</button>
</div>

<script>
'use strict';
const $ = id => document.getElementById(id);
const stage = $('stage');
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
let paused = false, ended = false;

function wait(ms){
  return new Promise(res => {
    const t0 = performance.now();
    let acc = 0, last = t0;
    (function step(now){
      if (!paused) acc += now - last;
      last = now;
      if (acc >= ms) return res();
      requestAnimationFrame(step);
    })(t0);
  });
}

/* ══ 角色 ══ */
const CAST = {};
function makeActor(id, sym, name, color, opt = {}){
  const a = document.createElement('div');
  a.className = 'actor';
  const body = document.createElement('div');
  body.className = 'body' + (opt.noBreath ? '' : ' breath');
  const s = document.createElement('span');
  s.className = 'sym'; s.textContent = sym; s.style.color = color;
  if (opt.glow) s.style.textShadow = `0 0 12px ${opt.glow}`;
  const n = document.createElement('span');
  n.className = 'nm'; n.textContent = name;
  body.append(s, n);
  a.appendChild(body);
  stage.appendChild(a);
  const actor = {el:a, body, sym:s, x:0, y:0, id, alive:true};
  CAST[id] = actor;
  return actor;
}
function setPos(actor, x, y){
  actor.x = x; actor.y = y;
  actor.el.style.left = x + '%';
  actor.el.style.top = y + '%';
}
/* 走位＝外層；演技＝內層
   style: 'hop'開心彈跳 · 'glide'完美滑行 · 'mech'機械等速 · 'slow'緩慢 */
async function walkTo(actor, x, y, style){
  const dist = Math.hypot(x - actor.x, y - actor.y);
  const speed = {hop:22, glide:26, mech:18, slow:9}[style] ?? 20;   // %/s
  const dur = Math.max(400, dist / speed * 1000);
  const ease = {hop:'ease-in-out', glide:'cubic-bezier(.4,0,.3,1)',
                mech:'linear', slow:'cubic-bezier(.4,.1,.5,1)'}[style] ?? 'ease';
  if (style === 'hop' && !reduceMotion) actor.body.classList.add('hop');
  actor.el.style.transition = `left ${dur}ms ${ease}, top ${dur}ms ${ease}`;
  setPos(actor, x, y);
  await wait(dur + 60);
  actor.body.classList.remove('hop');
}
function tremble(actor, on){
  actor.body.classList.toggle('trem', on && !reduceMotion);
  actor.body.classList.toggle('breath-fast', on && !reduceMotion);
  if (on) actor.body.classList.remove('breath');
  else if (actor.alive){ actor.body.classList.remove('breath-fast'); actor.body.classList.add('breath'); }
}
/* 壞死：傾倒＋紅色＋碎片噴濺 → 血泊 → 遺忘之點 */
async function collapse(actor, shardChar){
  actor.alive = false;
  actor.body.classList.remove('breath','breath-fast','trem','hop');
  actor.body.classList.add('dead');
  // 碎片與血點
  for (let i = 0; i < 14; i++){
    const sh = document.createElement('span');
    sh.className = 'shard';
    const red = Math.random() < .6;
    sh.textContent = red ? '•' : (shardChar ?? '▪');
    sh.style.color = red ? 'var(--blood)' : '#9aa0b4';
    sh.style.left = actor.x + '%'; sh.style.top = actor.y + '%';
    const ang = Math.random() * Math.PI * 2, r = 18 + Math.random() * 42;
    sh.style.setProperty('--dx', (Math.cos(ang)*r).toFixed(0) + 'px');
    sh.style.setProperty('--dy', (Math.sin(ang)*r*.6 + 14).toFixed(0) + 'px');
    sh.style.animationDelay = (Math.random()*.18) + 's';
    stage.appendChild(sh);
    setTimeout(() => sh.remove(), 1500);
  }
  const pool = document.createElement('div');
  pool.className = 'pool';
  pool.style.left = actor.x + '%'; pool.style.top = (actor.y + 4) + '%';
  stage.appendChild(pool);
  requestAnimationFrame(() => pool.classList.add('on'));
  await wait(1600);
  return pool;
}
function memDot(x, y){
  const d = document.createElement('span');
  d.className = 'memdot'; d.textContent = '·';
  d.style.left = x + '%'; d.style.top = (y + 3) + '%';
  stage.appendChild(d);
  requestAnimationFrame(() => d.classList.add('on'));
}
/* 對話氣泡：長在角色頭上 */
async function say(actor, text, opt = {}){
  const b = document.createElement('div');
  b.className = 'bub' + (opt.mech ? ' mech' : '');
  const bx = Math.min(86, Math.max(14, actor.x));
  b.style.left = bx + '%';
  b.style.top = (actor.y - 9) + '%';
  stage.appendChild(b);
  requestAnimationFrame(() => b.classList.add('on'));
  for (const ch of text){
    b.appendChild(document.createTextNode(ch));
    await wait(opt.mech ? 62 : 44);
  }
  await wait(900 + text.length * 42);
  b.classList.remove('on');
  setTimeout(() => b.remove(), 400);
}
async function caption(text, hold){
  const c = $('caption');
  c.style.opacity = 0;
  await wait(300);
  c.textContent = text;
  c.style.opacity = 1;
  await wait(hold ?? (800 + text.length * 60));
}

/* ══ 劇本（⚠ 原創佔位，犯罪幾何角色原型） ══ */
async function run(){
  await wait(600);

  const yuan = makeActor('yuan', '○', '小圓', '#e9e4d6');
  setPos(yuan, -6, 62);
  const star = makeActor('star', '☆', '星星', 'var(--warm)', {glow:'rgba(255,179,71,.5)'});
  setPos(star, 106, 40);
  const grid = makeActor('grid', '□', '白格', '#c9ccd6', {noBreath:true});   // 從不呼吸
  setPos(grid, 50, 118);

  await caption('廣場。所有活著的，都在微微呼吸。');
  await walkTo(yuan, 30, 62, 'hop');                       // 開心地彈跳
  await say(yuan, '今天天氣真好！');
  await walkTo(star, 62, 46, 'glide');                     // 完美滑行——太平滑本身就是警訊
  await say(star, '早安，小圓。跟我來，給你看個好東西。');
  await walkTo(yuan, 54, 52, 'hop');                       // 趨性：被吸引

  await caption('然後，廣場安靜下來。');
  await walkTo(grid, 50, 74, 'mech');                      // 機械步：等速、直線、不呼吸
  await say(grid, '例行檢查。', {mech:true});
  tremble(yuan, true);                                     // 張力：顫抖
  await wait(900);
  await say(yuan, '我、我沒有做什麼——');
  await say(star, '就是它。');                              // 背叛只需要三個字
  await caption('星星輕輕退開了半步。', 1400);
  await walkTo(star, 74, 40, 'glide');

  await walkTo(yuan, 42, 58, 'slow');                      // 緩慢地退
  await walkTo(grid, 46, 66, 'mech');
  $('stage').classList.add('zoom');                        // 鏡頭：推近
  await wait(1200);
  const pool = await collapse(yuan, '○');                  // 壞死：傾倒＋紅＋碎片
  await wait(1400);
  await say(grid, '已回收。', {mech:true});

  await caption('沒有誰說話。星星滑走了，像來的時候一樣平滑。');
  await walkTo(star, 108, 36, 'glide');
  await walkTo(grid, 50, 120, 'mech');
  $('stage').classList.remove('zoom');
  await wait(1000);

  pool.classList.add('fade');                              // 血泊淡去
  CAST.yuan.body.style.opacity = 0;
  await wait(2200);
  memDot(42, 58);                                          // 遺忘之點
  await caption('舞台上只剩下一枚小點。', 3000);

  ended = true;
  $('pauseTip').textContent = '';
  $('btnReplay').classList.add('show');
}

$('cover').addEventListener('pointerdown', () => {
  $('cover').classList.add('gone');
  setTimeout(run, 1100);
}, {once:true});
document.addEventListener('pointerdown', e => {
  if (e.target.closest('#cover') || e.target.closest('#btnReplay') || ended) return;
  paused = !paused;
  $('pauseTip').textContent = paused ? '已暫停 · 點擊繼續' : '自動播放 · 點擊暫停';
});
$('btnReplay').onclick = () => location.reload();
</script>
</body>
</html>
