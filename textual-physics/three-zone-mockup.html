<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三框排版 Mockup · 麵包屑</title>
<!--
  ══════════════════════════════════════════════
  三框排版 Mockup v0.1
  上框＝主角（我說了什麼）
  中框＝世界舞台（世界發生了什麼：旁白/道具/互動）
  下框＝聲部（世界對我說了什麼：他者/心聲/系統）
  展示：指揮棒（活躍框亮、其餘暗）、共存對峙
        （上框證詞掛著、下框反駁打出）、
        道具演出（檸檬雪寶）、倒轉時刻（心聲入侵上框）
  文本節選：Sheep〈麵包屑〉第六節（部分橋接句為佔位改寫）
  ══════════════════════════════════════════════
-->
<style>
  :root{
    --night-0:#0c0a12; --night-1:#151126;
    --paper:#e9e4d6; --muted:#93a0bf; --faint:#5b6784;
    --cold:#9fd8ff; --warm:#ffb347; --mind:#b9a3e0;
    --glass:rgba(16,13,28,.8); --line:rgba(147,160,191,.16);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; overflow:hidden; color:var(--paper);
    font-family:Georgia,'Noto Serif TC','PMingLiU',serif;
    background:
      radial-gradient(1.2px 1.2px at 24% 16%, rgba(233,228,214,.3), transparent),
      radial-gradient(1px 1px at 74% 8%, rgba(233,228,214,.25), transparent),
      radial-gradient(90% 60% at 50% 112%, rgba(64,44,20,.25), transparent 70%),
      linear-gradient(180deg,var(--night-0),var(--night-1));
    user-select:none;
  }

  #app{
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; padding:12px 10px 14px; gap:10px;
  }
  #head{
    width:min(94vw,700px); display:flex; justify-content:space-between;
    font:10px 'Courier New',monospace; letter-spacing:.22em; color:var(--faint);
  }

  .zone{
    width:min(94vw,700px); position:relative;
    background:var(--glass); border:1px solid var(--line); border-radius:12px;
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    padding:12px 20px 14px;
    opacity:.5; transition:opacity .5s, border-color .5s;
  }
  .zone.active{opacity:1; border-color:rgba(233,228,214,.32)}
  .zlabel{
    position:absolute; top:9px; right:13px;
    font:9.5px 'Courier New',monospace; letter-spacing:.24em; color:var(--faint);
  }
  .who{
    font:11.5px 'Courier New',monospace; letter-spacing:.22em;
    min-height:13px; margin-bottom:8px;
  }
  .txt{font-size:16.5px; line-height:1.95; letter-spacing:.04em; transform-origin:50% 100%}
  .txt span{display:inline-block; white-space:pre}

  #zTop{min-height:104px}
  #zTop.invaded{border-color:rgba(185,163,224,.4)}
  #zTop.invaded .txt{font-style:italic; color:#cfc4e6}

  #zMid{flex:1; min-height:150px; display:flex; flex-direction:column; overflow:hidden}
  #midTxt{color:rgba(233,228,214,.88)}
  #stage{
    margin-top:auto; padding-top:12px; min-height:44px;
    display:flex; align-items:center; justify-content:center; gap:26px;
  }
  #prop{
    font-size:20px; color:var(--warm); opacity:0;
    transition:opacity 1s, color 3.5s, transform 1s;
  }
  #prop.show{opacity:1}
  #prop.gone{opacity:0; transform:translateY(6px)}
  #prop.cold{color:var(--cold); opacity:.65}
  #propName{
    font:10px 'Courier New',monospace; letter-spacing:.2em; color:var(--faint);
    opacity:0; transition:opacity 1s;
  }
  #propName.show{opacity:1}

  #zBot{min-height:118px}
  .reg-mind .txt{font-style:italic; color:#cfc4e6; font-size:15.5px}
  .reg-sys  .txt{font-family:'Courier New',monospace; font-size:13.5px;
                 letter-spacing:.1em; color:var(--muted)}

  #ecg{display:block; width:min(94vw,700px); height:20px; opacity:.7; margin:-4px 0}
  #ecg polyline{fill:none; stroke:var(--cold); stroke-width:1}

  .breathe{animation:breathe 4.6s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-1.4px) scale(1.004)}}
  .tremor{animation:tremor .16s steps(2) infinite}
  @keyframes tremor{0%{transform:translate(0,0)}50%{transform:translate(.4px,-.3px)}100%{transform:translate(-.3px,.2px)}}

  .fx-t{animation:jit .22s steps(2) infinite}
  @keyframes jit{0%{transform:translate(0,0)}33%{transform:translate(.7px,-.6px)}66%{transform:translate(-.6px,.5px)}100%{transform:translate(.4px,.3px)}}
  .fx-c{color:var(--cold)}
  .fx-w{color:var(--warm)}
  .fx-f{font-weight:700; color:#f2f5fa}
  .fx-f.settle{animation:settle .9s cubic-bezier(.2,.9,.3,1) 1}
  @keyframes settle{0%{transform:translateY(-5px); text-shadow:0 0 10px rgba(159,216,255,.8)}100%{transform:translateY(0); text-shadow:none}}
  .fx-q{color:#c9a7ff; border-bottom:1px dotted rgba(201,167,255,.5); cursor:help; text-align:center}

  #choices{display:none; gap:22px; justify-content:center; padding-top:6px}
  #choices.show{display:flex}
  .choice{
    cursor:pointer; font:inherit; font-size:15px; letter-spacing:.1em;
    color:var(--paper); background:rgba(233,228,214,.04);
    border:1px solid var(--line); border-radius:10px; padding:10px 24px;
    transition:border-color .25s; will-change:transform;
  }
  .choice:hover{border-color:var(--warm)}
  .choice.cold-still{color:var(--cold)}
  .choice.cold-still:hover{border-color:var(--cold)}
  .choice.apop{animation:apop .8s cubic-bezier(.5,0,.8,.4) forwards; pointer-events:none}
  @keyframes apop{to{transform:scale(.15); opacity:0; filter:blur(2px)}}
  .dot{position:fixed; z-index:5; color:var(--faint); font-size:10px; pointer-events:none; opacity:.85}

  #foot{
    width:min(94vw,700px); display:flex; justify-content:space-between; align-items:center;
    font:10.5px 'Courier New',monospace; letter-spacing:.16em; color:var(--faint);
    min-height:24px;
  }
  #next{animation:blink 1.6s ease-in-out infinite; opacity:0}
  #next.show{opacity:1}
  @keyframes blink{0%,100%{opacity:.2}50%{opacity:.85}}
  #btnReplay{
    display:none; cursor:pointer; font:inherit; color:var(--muted);
    background:transparent; border:1px solid var(--line); border-radius:6px; padding:4px 12px;
  }
  #btnReplay:hover{color:var(--warm); border-color:var(--warm)}
  #btnReplay.show{display:inline-block}

  @media (max-width:640px){
    .txt{font-size:15px; line-height:1.85}
    #zTop{min-height:92px} #zBot{min-height:104px}
    .zone{padding:10px 14px 12px}
  }
  @media (prefers-reduced-motion:reduce){
    .breathe,.tremor,.fx-t{animation:none}
  }
</style>
</head>
<body>
<div id="app">
  <div id="head">
    <span>THREE-ZONE LAYOUT MOCKUP</span><span>麵包屑 · 第六節</span>
  </div>

  <div class="zone" id="zTop">
    <span class="zlabel">上 · 主角</span>
    <div class="who" id="topWho"></div>
    <div class="txt" id="topTxt"></div>
  </div>

  <div class="zone" id="zMid">
    <span class="zlabel">中 · 世界</span>
    <div class="who" id="midWho"></div>
    <div class="txt" id="midTxt"></div>
    <div id="choices"></div>
    <div id="stage">
      <span id="prop">●</span><span id="propName">檸檬雪寶</span>
    </div>
  </div>

  <svg id="ecg" preserveAspectRatio="none"><polyline id="ecgLine"/></svg>

  <div class="zone" id="zBot">
    <span class="zlabel">下 · 聲部</span>
    <div class="who" id="botWho"></div>
    <div class="txt" id="botTxt"></div>
  </div>

  <div id="foot">
    <span id="hintTip">點擊推進 · 三框各司其職 · 注意誰亮著</span>
    <span id="next">▼</span>
    <button id="btnReplay">↺ 重演</button>
  </div>
</div>

<script>
'use strict';
/* ══ 劇本：z＝框(t上/m中/b下) · reg＝聲部(other/mind/sys/invade) ══ */
const SCRIPT = [
  {z:'m', who:'旁白', bpm:60, text:'世人以為，那是長者的{q:慈愛|馴化}。'},
  {z:'m', who:'旁白', bpm:64, text:'會議結束了。斯內普又是最後一個離開。他走到門口，停下，回過頭。'},
  {z:'t', who:'鄧不利多', bpm:66, text:'「辛苦了，西弗勒斯。」'},
  {z:'m', who:'旁白', bpm:82, text:'他的右手藏在袖子裡。{c}黑色的詛咒，已經爬到手腕了。{/c}'},
  {z:'b', reg:'other', who:'斯內普', bpm:88, text:'「請放心，校長。到時候，我的手{f}不會抖{/f}。」'},
  {z:'b', reg:'mind', who:'心聲', bpm:94, text:'{c}他知道。他當然知道。{/c}'},
  {z:'t', who:'鄧不利多', bpm:92, tremor:true, text:'「我知道，西弗勒斯。去休息吧。」'},
  {z:'m', who:'旁白', bpm:90, text:'他用左手，遞過去一顆檸檬雪寶。', prop:'show'},
  {choice:[
    {label:'接過去。', key:'take', pull:true},
    {label:'沒接。',  key:'refuse', still:true}
  ]},
  {branch:'take',   z:'m', who:'旁白', bpm:88, text:'斯內普接過糖，放進口袋。像過去十幾年一樣。', prop:'gone'},
  {branch:'refuse', z:'m', who:'旁白', bpm:88, text:'斯內普看了那顆糖一眼。{c}沒接。{/c}只是轉身離開。'},
  {branch:'take',   z:'b', reg:'sys', who:'系統', bpm:86, text:'【檸檬雪寶——已交付。戲，尚未散場】'},
  {branch:'refuse', z:'b', reg:'sys', who:'系統', bpm:86, text:'【檸檬雪寶——十幾年來，首次被拒絕】', prop:'cold'},
  {z:'m', who:'旁白', bpm:96, text:'門關上了。{t}左手的手指，在發抖。{/t}'},
  {z:'b', reg:'mind', who:'心聲', bpm:44, tremor:true, text:'時間不多了。'},
  {z:'t', reg:'invade', who:'牆上的那一個', bpm:40, text:'真正的阿不思，可以休息了。'},
  {z:'t', reg:'invade', who:'牆上的那一個', bpm:38, end:true, text:'{c}但我，將永遠醒著。{/c}'}
];

/* ══ 標記解析器（同對話演出器 v0.1） ══ */
function parseLine(text){
  const out = []; let i = 0;
  const tagMap = {t:'fx-t', c:'fx-c', w:'fx-w', f:'fx-f'};
  const stack = [];
  while (i < text.length){
    const qm = /^\{q:([^|}]+)\|([^}]+)\}/.exec(text.slice(i));
    if (qm){ out.push({quantum:[qm[1], qm[2]]}); i += qm[0].length; continue; }
    const tm = /^\{(\/?)([tcwf])\}/.exec(text.slice(i));
    if (tm){ if (tm[1]) stack.pop(); else stack.push(tagMap[tm[2]]); i += tm[0].length; continue; }
    out.push({ch:text[i], cls:stack.join(' ')});
    i++;
  }
  return out;
}
/* 節拍（標點＝樂譜；機械聲部壓平） */
function pauseAfter(ch, mech){
  const P = {'，':170,'、':120,'。':330,'？':300,'！':300,'⋯':260,'…':260,'—':180,'\u2014':180};
  const p = P[ch] ?? 0;
  return mech ? (p > 0 ? 120 : 0) : p;
}
/* 聲部簽名：語速／呼吸／名牌色 */
const VOICE = {
  protag:{base:52, whoColor:'var(--warm)',  breathe:true,  mech:false},
  other: {base:74, whoColor:'var(--cold)',  breathe:false, mech:true },
  mind:  {base:58, whoColor:'var(--mind)',  breathe:false, mech:false},
  sys:   {base:16, whoColor:'var(--faint)', breathe:false, mech:false},
  narr:  {base:38, whoColor:'var(--faint)', breathe:false, mech:false},
  invade:{base:62, whoColor:'var(--mind)',  breathe:false, mech:false}
};
function voiceOf(L){
  if (L.z === 't') return L.reg === 'invade' ? 'invade' : 'protag';
  if (L.z === 'm') return 'narr';
  return L.reg ?? 'other';
}

/* ══ DOM ══ */
const $ = id => document.getElementById(id);
const Z = {t:$('zTop'), m:$('zMid'), b:$('zBot')};
const WHO = {t:$('topWho'), m:$('midWho'), b:$('botWho')};
const TXT = {t:$('topTxt'), m:$('midTxt'), b:$('botTxt')};
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

let idx = 0, typing = false, skipFlag = false, branchKey = null, ended = false;
let targetBpm = 60;

function conduct(zone){
  for (const k in Z) Z[k].classList.toggle('active', k === zone);
}

async function playLine(L){
  typing = true; skipFlag = false;
  $('next').classList.remove('show');
  conduct(L.z);
  targetBpm = L.bpm ?? targetBpm;

  const v = VOICE[voiceOf(L)];
  const whoEl = WHO[L.z], txtEl = TXT[L.z];
  whoEl.textContent = L.who ?? '';
  whoEl.style.color = v.whoColor;

  const zoneEl = Z[L.z];
  if (L.z === 't' && L.reg === 'invade') zoneEl.classList.add('invaded');
  if (L.z === 'b'){
    zoneEl.classList.remove('reg-mind','reg-sys');
    if (L.reg === 'mind') zoneEl.classList.add('reg-mind');
    if (L.reg === 'sys')  zoneEl.classList.add('reg-sys');
  }

  txtEl.className = 'txt';
  if (!reduceMotion && v.breathe && L.reg !== 'invade') txtEl.classList.add('breathe');
  if (!reduceMotion && L.tremor) txtEl.classList.add('tremor');
  txtEl.innerHTML = '';

  if (L.prop) propAct(L.prop);

  const seq = parseLine(L.text);
  const frozen = [];
  for (const item of seq){
    if (item.quantum){ txtEl.appendChild(makeQuantum(item.quantum)); if (!skipFlag) await wait(300); continue; }
    const sp = document.createElement('span');
    sp.textContent = item.ch;
    if (item.cls){
      sp.className = item.cls;
      if (item.cls.includes('fx-t') && !reduceMotion){
        sp.style.animationDuration = (0.18 + Math.random()*0.12).toFixed(2) + 's';
        sp.style.animationDelay = (-Math.random()*0.2).toFixed(2) + 's';
      }
      if (item.cls.includes('fx-f')) frozen.push(sp);
    }
    txtEl.appendChild(sp);
    if (!skipFlag){
      const cjk = /[\u4e00-\u9fff\u3000-\u303f\uff00-\uffef]/.test(item.ch);
      await wait((cjk ? v.base : v.base * 0.55) + pauseAfter(item.ch, v.mech));
    }
  }
  if (frozen.length && !reduceMotion) frozen.forEach(sp => sp.classList.add('settle'));
  typing = false;
  if (!L.end) $('next').classList.add('show');
}

function makeQuantum(states){
  const sp = document.createElement('span');
  sp.className = 'fx-q'; sp.textContent = states[0];
  const ruler = document.createElement('span');
  ruler.style.cssText = 'visibility:hidden;position:absolute;white-space:pre;font:inherit';
  document.body.appendChild(ruler);
  let w = 0;
  for (const s of states){ ruler.textContent = s; w = Math.max(w, ruler.offsetWidth); }
  ruler.remove();
  sp.style.minWidth = w + 'px';
  let k = 0, paused = false;
  setInterval(() => { if (!paused){ k = 1 - k; sp.textContent = states[k]; } }, 700);
  sp.addEventListener('mouseenter', () => { paused = true; });
  sp.addEventListener('mouseleave', () => { paused = false; });
  sp.addEventListener('touchstart', () => { paused = !paused; }, {passive:true});
  return sp;
}
function wait(ms){
  return new Promise(res => {
    const t0 = performance.now();
    (function step(){
      if (skipFlag || performance.now() - t0 >= ms) return res();
      requestAnimationFrame(step);
    })();
  });
}

/* 道具演出：檸檬雪寶 */
function propAct(act){
  const p = $('prop'), n = $('propName');
  if (act === 'show'){ p.classList.add('show'); n.classList.add('show'); }
  if (act === 'gone'){ p.classList.remove('cold'); p.classList.add('gone'); n.classList.remove('show'); }
  if (act === 'cold'){ p.classList.add('cold'); }
}

/* 選項（互動屬於中框）＋趨性＋未選者凋亡 */
function showChoices(opts){
  conduct('m');
  const box = $('choices');
  box.innerHTML = '';
  const btns = opts.map(o => {
    const b = document.createElement('button');
    b.className = 'choice' + (o.still ? ' cold-still' : '');
    b.textContent = o.label; b._opt = o;
    box.appendChild(b); return b;
  });
  box.classList.add('show');

  function onMove(e){
    for (const b of btns){
      if (!b._opt.pull || b.classList.contains('apop')) continue;
      const r = b.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      const dx = e.clientX - cx, dy = e.clientY - cy;
      const d = Math.hypot(dx, dy);
      if (d < 200 && !reduceMotion){
        const k = (1 - d/200) * 7;
        b.style.transform = `translate(${(dx/d*k).toFixed(1)}px, ${(dy/d*k).toFixed(1)}px)`;
      } else b.style.transform = '';
    }
  }
  document.addEventListener('mousemove', onMove);
  btns.forEach(b => b.addEventListener('click', ev => {
    ev.stopPropagation();
    document.removeEventListener('mousemove', onMove);
    branchKey = b._opt.key;
    for (const other of btns){
      if (other === b) continue;
      const r = other.getBoundingClientRect();
      other.classList.add('apop');
      setTimeout(() => {
        const dot = document.createElement('span');
        dot.className = 'dot'; dot.textContent = '·';
        dot.style.left = (r.left + r.width/2) + 'px';
        dot.style.top  = (r.top + r.height/2) + 'px';
        document.body.appendChild(dot);
      }, 750);
    }
    b.style.borderColor = 'var(--warm)';
    setTimeout(() => { box.classList.remove('show'); box.innerHTML = ''; advance(); }, 950);
  }));
}

/* 推進 */
function nextPlayable(){
  while (idx < SCRIPT.length){
    const L = SCRIPT[idx];
    if (L.branch && L.branch !== branchKey){ idx++; continue; }
    return L;
  }
  return null;
}
function advance(){
  if (typing){ skipFlag = true; return; }
  const L = nextPlayable();
  if (!L){ finale(); return; }
  idx++;
  if (L.choice){ showChoices(L.choice); return; }
  playLine(L).then(() => { if (L.end) finale(); });
}
function finale(){
  if (ended) return;
  ended = true;
  $('btnReplay').classList.add('show');
  $('hintTip').textContent = '倒轉時刻：心聲入侵了上框——位置即語言';
}

/* 心電圖：中下框之間的活分隔線 */
const ecgLine = $('ecgLine');
let bpm = 60, pts = [], lastBeat = 0;
function ecgLoop(now){
  const el = $('ecg');
  const wEl = el.clientWidth || 600, hEl = 20;
  el.setAttribute('viewBox', `0 0 ${wEl} ${hEl}`);
  bpm += (targetBpm - bpm) * 0.02;
  const interval = 60000 / bpm;
  let y = hEl * 0.6;
  if (!reduceMotion){
    if (now - lastBeat > interval) lastBeat = now;
    const q = (now - lastBeat) / interval;
    if (q < 0.06) y -= 9 * Math.sin(q/0.06 * Math.PI);
    else if (q < 0.12) y += 3 * Math.sin((q-0.06)/0.06 * Math.PI);
    else if (q > 0.3 && q < 0.42) y -= 2.2 * Math.sin((q-0.3)/0.12*Math.PI);
  }
  pts.push(y);
  const maxPts = Math.floor(wEl / 2);
  if (pts.length > maxPts) pts = pts.slice(-maxPts);
  ecgLine.setAttribute('points', pts.map((p,i) => `${i*2},${p.toFixed(1)}`).join(' '));
  requestAnimationFrame(ecgLoop);
}

/* 接線 */
document.addEventListener('pointerdown', e => {
  if (e.target.closest('.choice') || e.target.closest('#btnReplay') || e.target.closest('.fx-q')) return;
  if (!ended) advance();
});
document.addEventListener('keydown', e => {
  if ((e.key === 'Enter' || e.key === ' ') && !ended){ e.preventDefault(); advance(); }
});
$('btnReplay').onclick = () => location.reload();

advance();
requestAnimationFrame(ecgLoop);
</script>
</body>
</html>
