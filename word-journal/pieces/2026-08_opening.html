    <!-- 這篇是範例，內容可以整段改寫成你自己的話 -->
    <div class="prose reveal">
      <p>這本文集開始於二〇二六年的八月。沒有什麼盛大的理由，只是覺得寫下的東西應該有一個固定的去處——不是散落在各個平台的草稿箱裡，而是裝訂在同一本冊子裡，按著時間排下去。</p>
      <p>收錄的範圍很寬：原創的小說與短章、同人的習作、還有讀別人的文字時做的研究筆記。完成度不是門檻，寫完就收；比起挑選，這本冊子更在意的是留下。</p>
      <div class="brk">＊</div>
      <p>隔壁還有一本姊妹冊，收的是畫。文與圖各記各的，偶爾互相參照。若干年後回頭翻，希望兩本都變得很厚。</p>
      <p class="fin-line">（完）</p>
