  <nav class="crumbs"><a href="../fanwork.html">← 卷二 · 同人</a></nav>

  <article>
    <header class="piece-head reveal">
      <p class="piece-no">卷二 · 篇一</p>
      <h2>（篇名）</h2>
      <p class="piece-meta">____.__ · 計 _,___ 字</p>
      <div class="rule" style="--cell:9"><span class="tag">20 × 20</span></div>

      <!-- 同人篇頭聲明欄：每篇同人都保留這一塊，欄位照實填 -->
      <div class="fan-note">
        <dl>
          <dt>原作</dt><dd>（原作名稱）</dd>
          <dt>角色</dt><dd>（角色或配對）</dd>
          <dt>分級</dt><dd>全年齡</dd>
          <dt>聲明</dt><dd>本篇為愛好者創作，角色與世界觀屬於原作者；僅收錄於此，請勿轉載。</dd>
        </dl>
      </div>
    </header>

    <div class="prose reveal">
      <p>（正文自此開始。段落會自動縮排兩字，直接一段一段寫即可。）</p>
      <p>（需要分節的地方，插入下面這行分節符。）</p>
      <div class="brk">＊</div>
      <p>（寫完在最末放一個「完」。）</p>
      <p class="fin-line">（完）</p>
    </div>
  </article>

  <div class="pager">
