  <!-- 一個方法一個 exp；印章三款：
       <span class="stamp">有效</span>
       <span class="stamp">無效</span>
       <span class="stamp gray">進行中</span> -->
  <article class="exp reveal">
    <header class="exp-head">
      <p class="exp-no">實驗 01 · 2026.__.__ 起</p>
      <h3>（方法名稱，例：每天狂背一百個單字）</h3>
      <span class="stamp gray">進行中</span>
    </header>
    <dl class="exp-grid">
      <dt>出處</dt><dd>（在哪看到的：影片、文章、朋友吹的）</dd>
      <dt>假設</dt><dd>(它宣稱能達成什麼)</dd>
      <dt>做法</dt><dd>（實際怎麼執行、每天花多久）</dd>
      <dt>週期</dt><dd>（測多久才算數，例：連續十四天）</dd>
      <dt>結果</dt><dd>（客觀發生了什麼；能量化就量化：記住幾個、忘了幾個）</dd>
      <dt>判定</dt><dd>（有效／部分有效／無效——關鍵是寫出為什麼，和適合什麼樣的人）</dd>
    </dl>
  </article>
