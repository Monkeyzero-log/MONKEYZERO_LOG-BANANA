<!DOCTYPE html>
<!--
  演出層 POC 2：象形字地圖・行走・轉場
  定位：延續「演出層」思路的文字遊戲原型，不含 TextualPhysicsEngine。
       核心概念：地圖用地形的名字砌成（山＝山、森＝森、～＝水）、
                行走留下標點腳印、走進「門」字 = 穿過那個字進入室內。

  操作方式：方向鍵 / WASD 移動（手機可用畫面右下角的方向按鈕）。

  打開後預期看到：
  1. 一張由漢字砌成的地圖：山（灰，不可通行）、森（綠，不可通行）、
     川（藍，河流，不可通行）、～（淺水，可通行）、田（土黃，可通行）。
  2. 迷霧：距離「我」較遠的字模糊且極暗；走過（讀過）的區域半亮；
     「我」周圍 2~3 格內清晰明亮。
  3. 移動時，離開的格子留下一枚頓號「、」腳印，約 2 秒淡出。
  4. 走近「森」時，附近的森字會沙沙抖動一下；
     踩進「～」淺水時，「我」自己開始上下波動，水面波紋一直在動。
  5. 走到左下角的「門」上 → 門字從原位放大到填滿螢幕（穿過那個字），
     畫面切入室內場景：一段敘述文字，其中「顫動」二字真的在顫動。
  6. 點室內文字中發亮的「門」→ 整個室內場景的字逐一鬆脫、旋轉、
     墜落出畫面（溶解轉場），回到地圖，「我」站在門外。
-->
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>POC 2：象形字地圖・行走・轉場</title>
<style>
  :root { --cell: clamp(26px, 5.5vw, 40px); }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  body {
    background: #0b0d12; color: #d6dbe6;
    font-family: "Noto Sans TC", "Microsoft JhengHei", "PingFang TC", sans-serif;
    display: flex; align-items: center; justify-content: center;
  }

  #hint {
    position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
    color: #59617a; font-size: 13px; text-align: center; z-index: 5;
  }

  /* ── 地圖 ── */
  #world { position: relative; }
  #grid {
    display: grid;
    grid-template-columns: repeat(var(--cols), var(--cell));
  }
  .cell {
    width: var(--cell); height: var(--cell);
    line-height: var(--cell); text-align: center;
    font-size: calc(var(--cell) * 0.8);
    user-select: none;
    transition: opacity 0.5s, filter 0.5s;
  }
  .t-山 { color: #6d7488; }
  .t-森 { color: #4a7a5a; }
  .t-川 { color: #6aa0d8; }
  .t-water { color: #3f6ea8; animation: wave 1.6s ease-in-out infinite; }
  .t-田 { color: #a8935c; }
  .t-門 { color: #e8c56a; text-shadow: 0 0 12px rgba(232,197,106,0.35); }

  @keyframes wave { 0%,100% { transform: translateY(0); }
                    50%      { transform: translateY(3px); } }

  @keyframes rustle { 0%,100% { transform: translate(0,0); }
                      25% { transform: translate(-1.5px, 0.5px); }
                      75% { transform: translate(1.5px, -0.5px); } }
  .rustling { animation: rustle 0.12s 3; }

  /* 迷霧三態 */
  .dark { opacity: 0.10; filter: blur(2.5px); }
  .seen { opacity: 0.38; filter: blur(0.6px); }
  .lit  { opacity: 1;    filter: none; }

  /* ── 玩家 ── */
  #player {
    position: absolute;
    width: var(--cell); height: var(--cell);
    line-height: var(--cell); text-align: center;
    font-size: calc(var(--cell) * 0.82);
    color: #ffffff; font-weight: 700;
    text-shadow: 0 0 10px rgba(160,190,255,0.5);
    transition: left 0.16s, top 0.16s;
    z-index: 3; pointer-events: none;
  }
  #player.in-water { animation: wave 1.1s ease-in-out infinite; color: #bfe0ff; }

  /* 腳印 */
  .footprint {
    position: absolute;
    width: var(--cell); height: var(--cell);
    line-height: var(--cell); text-align: center;
    font-size: calc(var(--cell) * 0.5);
    color: #7a8296; opacity: 0.6;
    transition: opacity 1.8s; pointer-events: none; z-index: 2;
  }

  /* ── 門字放大轉場 ── */
  #zoom-door {
    position: fixed; z-index: 20; pointer-events: none;
    color: #e8c56a; text-align: center;
    transition: transform 1.0s cubic-bezier(0.55, 0, 0.85, 0.4), opacity 1.0s;
    transform-origin: center; opacity: 0; display: none;
  }
  #curtain {
    position: fixed; inset: 0; background: #060709;
    opacity: 0; pointer-events: none; transition: opacity 1.0s; z-index: 15;
  }

  /* ── 室內場景 ── */
  #interior {
    position: fixed; inset: 0; z-index: 30;
    display: none; align-items: center; justify-content: center;
    background: #0e1016;
  }
  #interior-text {
    max-width: 30em; font-size: clamp(19px, 3vw, 26px);
    line-height: 2.2; letter-spacing: 2px; color: #c9cfdd;
    padding: 0 24px;
  }
  #interior-text .ch { display: inline-block; }
  #interior-text .door-word {
    color: #e8c56a; cursor: pointer;
    text-shadow: 0 0 10px rgba(232,197,106,0.4);
    border-bottom: 1px dashed rgba(232,197,106,0.5);
  }
  @keyframes jit { 0% { transform: translate(0,0); }
                   50% { transform: translate(var(--jx), var(--jy)); }
                   100% { transform: translate(-1px, 0.5px); } }
  .trembling { animation: jit 0.11s infinite alternate; }

  /* 溶解：字逐一墜落 */
  .falling {
    transform: translateY(110vh) rotate(var(--rot)) !important;
    opacity: 0 !important;
    transition: transform 1.1s cubic-bezier(0.5, 0, 0.9, 0.6), opacity 1.1s !important;
  }

  /* ── 手機方向鍵 ── */
  #dpad {
    position: fixed; right: 18px; bottom: 18px; z-index: 10;
    display: grid; grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(2, 44px); gap: 5px;
  }
  #dpad button {
    background: #1c212c; color: #c8cede; border: 1px solid #333a4a;
    border-radius: 8px; font-size: 18px; cursor: pointer;
  }
  #dpad button:active { background: #3a4154; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
  }
</style>
</head>
<body>

<div id="hint">方向鍵 / WASD 移動。走近森林聽它沙沙抖，踩進淺水看看自己，然後去左下角找那扇「門」。</div>

<div id="world">
  <div id="grid"></div>
  <div id="player">我</div>
</div>

<div id="curtain"></div>
<div id="zoom-door">門</div>

<div id="interior">
  <div id="interior-text"></div>
</div>

<div id="dpad">
  <span></span><button data-d="up">↑</button><span></span>
  <button data-d="left">←</button><button data-d="down">↓</button><button data-d="right">→</button>
</div>

<script>
// ═══════════════════════════════════════════════
// 地圖：字就是地形（山＝山、森＝森、～＝水）
// ═══════════════════════════════════════════════
const MAP = [
  '山山山山山山山山山山山山山山',
  '山森森森森　　　川　　田田山',
  '山森森　　　　　川　　田田山',
  '山森　　　　　　川川　田　山',
  '山　　　　　　　　川　　　山',
  '山　　　～～～～　川川　　山',
  '山　門　～～～～～　川　　山',
  '山山山山山山山山山山山山山山',
];
const ROWS = MAP.length, COLS = [...MAP[0]].length;
const SOLID = new Set(['山', '森', '川']);
const grid = document.getElementById('grid');
grid.style.setProperty('--cols', COLS);

const cells = [];   // cells[y][x] = { el, ch }
for (let y = 0; y < ROWS; y++) {
  cells.push([]);
  const rowChars = [...MAP[y]];
  for (let x = 0; x < COLS; x++) {
    const ch = rowChars[x];
    const el = document.createElement('div');
    el.className = 'cell dark';
    el.textContent = ch === '　' ? '' : ch;
    if (ch === '～') {
      el.classList.add('t-water');
      el.style.animationDelay = (x * 0.18 + y * 0.1) + 's';
    } else if (ch !== '　') {
      el.classList.add('t-' + ch);
    }
    grid.appendChild(el);
    cells[y].push({ el, ch });
  }
}

// ═══════════════════════════════════════════════
// 玩家與行走
// ═══════════════════════════════════════════════
const playerEl = document.getElementById('player');
let px = 5, py = 4;          // 起點
let lastSafe = { x: px, y: py };
let locked = false;          // 轉場期間鎖操作
const visited = new Set();

function placePlayer() {
  playerEl.style.left = `calc(var(--cell) * ${px})`;
  playerEl.style.top  = `calc(var(--cell) * ${py})`;
  playerEl.classList.toggle('in-water', cells[py][px].ch === '～');
}

function updateFog() {
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      const d = Math.hypot(x - px, y - py);
      const c = cells[y][x];
      if (d <= 2.7) {
        visited.add(x + ',' + y);
        c.el.classList.remove('dark', 'seen');
        c.el.classList.add('lit');
      } else if (visited.has(x + ',' + y)) {
        c.el.classList.remove('dark', 'lit');
        c.el.classList.add('seen');
      } else {
        c.el.classList.remove('lit', 'seen');
        c.el.classList.add('dark');
      }
    }
  }
}

function dropFootprint(x, y) {
  const f = document.createElement('div');
  f.className = 'footprint';
  f.textContent = '、';
  f.style.left = `calc(var(--cell) * ${x})`;
  f.style.top  = `calc(var(--cell) * ${y})`;
  document.getElementById('world').appendChild(f);
  requestAnimationFrame(() => { f.style.opacity = '0'; });
  setTimeout(() => f.remove(), 2000);
}

function rustleForest() {
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const y = py + dy, x = px + dx;
      if (y < 0 || y >= ROWS || x < 0 || x >= COLS) continue;
      const c = cells[y][x];
      if (c.ch === '森') {
        c.el.classList.remove('rustling');
        void c.el.offsetWidth;          // 重置動畫
        c.el.classList.add('rustling');
      }
    }
  }
}

function move(dx, dy) {
  if (locked) return;
  const nx = px + dx, ny = py + dy;
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;
  const target = cells[ny][nx].ch;
  if (SOLID.has(target)) { rustleForest(); return; }

  dropFootprint(px, py);
  if (target !== '門') lastSafe = { x: nx, y: ny };
  px = nx; py = ny;
  placePlayer();
  updateFog();
  rustleForest();

  if (target === '門') enterDoor();
}

document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase()) ||
      ['w','a','s','d'].includes(k)) e.preventDefault();
  if (k === 'arrowup'    || k === 'w') move(0, -1);
  if (k === 'arrowdown'  || k === 's') move(0, 1);
  if (k === 'arrowleft'  || k === 'a') move(-1, 0);
  if (k === 'arrowright' || k === 'd') move(1, 0);
});
document.querySelectorAll('#dpad button').forEach(b => {
  b.addEventListener('click', () => {
    const d = b.dataset.d;
    if (d === 'up') move(0, -1);
    if (d === 'down') move(0, 1);
    if (d === 'left') move(-1, 0);
    if (d === 'right') move(1, 0);
  });
});

// ═══════════════════════════════════════════════
// 轉場一：走進「門」字 —— 門字放大到填滿螢幕
// ═══════════════════════════════════════════════
const zoomDoor = document.getElementById('zoom-door');
const curtain  = document.getElementById('curtain');
const interior = document.getElementById('interior');

function enterDoor() {
  locked = true;
  // 找到門格在螢幕上的位置，把放大用的「門」放到原位
  let doorCell = null;
  cells.forEach(row => row.forEach(c => { if (c.ch === '門') doorCell = c; }));
  const r = doorCell.el.getBoundingClientRect();
  zoomDoor.style.display = 'block';
  zoomDoor.style.left = r.left + 'px';
  zoomDoor.style.top = r.top + 'px';
  zoomDoor.style.width = r.width + 'px';
  zoomDoor.style.height = r.height + 'px';
  zoomDoor.style.lineHeight = r.height + 'px';
  zoomDoor.style.fontSize = (r.height * 0.8) + 'px';
  zoomDoor.style.transform = 'scale(1)';
  zoomDoor.style.opacity = '1';

  requestAnimationFrame(() => requestAnimationFrame(() => {
    zoomDoor.style.transform = 'scale(30)';   // 穿過那個字
    zoomDoor.style.opacity = '0.15';
    curtain.style.opacity = '1';
  }));

  setTimeout(showInterior, 1050);
}

// ═══════════════════════════════════════════════
// 室內場景：敘述文字，「顫動」真的在顫動、「門」可點
// ═══════════════════════════════════════════════
function showInterior() {
  zoomDoor.style.display = 'none';
  interior.style.display = 'flex';
  interior.style.background = '#0e1016';
  curtain.style.opacity = '0';

  const textEl = document.getElementById('interior-text');
  textEl.innerHTML = '';
  // 段落資料：{ t: 文字, fx: 'tremble' } 或 { t: '門', door: true }
  const parts = [
    { t: '屋裡很暗。只有一張桌子，桌上的信紙在' },
    { t: '顫動', fx: 'tremble' },
    { t: '。\n你不記得自己什麼時候進來的。\n身後的' },
    { t: '門', door: true },
    { t: '，還開著。' },
  ];
  parts.forEach(p => {
    [...p.t].forEach(ch => {
      if (ch === '\n') { textEl.appendChild(document.createElement('br')); return; }
      const s = document.createElement('span');
      s.className = 'ch';
      s.textContent = ch;
      if (p.fx === 'tremble') {
        s.classList.add('trembling');
        s.style.setProperty('--jx', ((Math.random() - 0.5) * 2.4).toFixed(2) + 'px');
        s.style.setProperty('--jy', ((Math.random() - 0.5) * 2.4).toFixed(2) + 'px');
      }
      if (p.door) {
        s.classList.add('door-word');
        s.addEventListener('click', dissolveInterior);
      }
      textEl.appendChild(s);
    });
  });
}

// ═══════════════════════════════════════════════
// 轉場二：溶解 —— 室內的字逐一鬆脫墜落，回到地圖
// ═══════════════════════════════════════════════
function dissolveInterior() {
  const chars = [...document.querySelectorAll('#interior-text .ch')];
  interior.style.transition = 'background 1.3s';
  interior.style.background = 'transparent';   // 背景先透出地圖
  chars.forEach(s => {
    s.style.setProperty('--rot', ((Math.random() - 0.5) * 240).toFixed(0) + 'deg');
    setTimeout(() => s.classList.add('falling'), Math.random() * 450);
  });
  setTimeout(() => {
    interior.style.display = 'none';
    interior.style.transition = '';
    // 回到門外的安全格
    px = lastSafe.x; py = lastSafe.y;
    placePlayer(); updateFog();
    locked = false;
  }, 1500);
}

// ── 初始化 ──
placePlayer();
updateFog();
</script>
</body>
</html>
