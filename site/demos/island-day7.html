<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>荒島樣本 · 第七天</title>
<!--
  ══════════════════════════════════════════════
  荒島求生樣本 v0.1《第七天》
  招牌機制:
  A. 字體即生命徵象——不做血條。
     飢餓=字重變細(700→300→100)、發燒=模糊+晃動、
     受傷=紅色微顫、瀕死=半透明。名牌同步顯示狀態詞。
  B. 人際引力——信任=吸引力、衝突=斥力。
     隨劇情改變引力參數，讀者會「看著」營地自己裂成兩團。

  打開後預期看到（點擊/空白鍵推進，共 8 拍，佔位文本）:
  1. 五個倖存者符號在沙灘營地緩慢漂移（引力模擬常駐）。
  2. 小葉發燒:「葉」開始模糊晃動，名牌變成「葉 · 發燒」。
  3. 阿岩藏水被發現:所有人對岩的引力轉負——岩被慢慢「推」出人群。
  4. 老船長分口糧:船與葉、米互相吸引，聚攏。
  5. 阿米倒戈:「米」開始漂向「岩」——第二個派系成形。
  6. 決裂拍:引力全面拉大，營地肉眼可見地裂成兩團+中間的醫生。
  7. 夜裡:程式計算兩團的重心，各點起一堆「火」——兩堆火。
  8. 結語+全員字重再掉一級（大家都更餓了）。
  9. 系統開啟「減少動態」時:漂移直接定位、顫抖以色調代替。
  ══════════════════════════════════════════════
-->
<style>
  :root{ --paper:#e9e4d6; --muted:#93a0bf; --faint:#5b6784;
         --warm:#ffb347; --blood:#e08585; }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{ margin:0; overflow:hidden; color:var(--paper); cursor:pointer;
    font-family:Georgia,'Noto Serif TC','PMingLiU',serif;
    background:linear-gradient(180deg,#0b1018,#12202b 60%,#1b2c30);
    user-select:none; }
  #head{ position:fixed; top:14px; left:16px; z-index:10;
    font:10px 'Courier New',monospace; letter-spacing:.22em; color:var(--faint); }
  #day{ position:fixed; top:14px; right:16px; z-index:10;
    font:12px 'Courier New',monospace; letter-spacing:.3em; color:var(--faint); }

  #stage{ position:fixed; inset:0; }
  .scenery{ position:absolute; color:#3a4a52; font-family:monospace;
            white-space:pre; pointer-events:none; }
  .fire{ color:#ff8a4d; animation:flick .5s steps(2) infinite;
         opacity:0; transition:opacity 1.5s; }
  .fire.lit{ opacity:1; }
  @keyframes flick{ 50%{ color:#ffb347; } }

  .actor{ position:absolute; text-align:center; will-change:transform;
          pointer-events:none; }
  .actor .glyph{ display:inline-block; font-size:38px; line-height:1;
    transition:font-weight .8s, opacity 1.2s, color .8s, filter 1.2s; }
  .actor .tag{ display:block; font:9.5px 'Courier New',monospace;
    letter-spacing:.15em; color:var(--faint); margin-top:4px;
    transition:color .8s; white-space:nowrap; }
  .g-fever{ animation:sway 1.6s ease-in-out infinite; }
  @keyframes sway{ 0%,100%{transform:rotate(-1.6deg)} 50%{transform:rotate(1.6deg)} }
  .g-hurt{ animation:jit .14s steps(2) infinite; }
  @keyframes jit{ 0%{transform:translate(0,0)} 50%{transform:translate(.8px,-.6px)}
                  100%{transform:translate(-.6px,.5px)} }

  #narr{ position:fixed; left:50%; bottom:20px; transform:translateX(-50%);
    width:min(620px,92vw); z-index:10;
    background:rgba(12,10,20,.88); border:1px solid rgba(147,160,191,.22);
    border-radius:10px; padding:13px 20px 15px; backdrop-filter:blur(8px); }
  #ntext{ font-size:15.5px; line-height:1.9; min-height:3.2em;
          letter-spacing:.04em; }
  #nnext{ position:absolute; right:14px; bottom:8px; color:var(--faint);
          animation:blink 1.6s infinite; opacity:0; }
  #nnext.show{ opacity:1; }
  @keyframes blink{ 0%,100%{opacity:.2} 50%{opacity:.85} }
  #btnReplay{ position:fixed; top:34px; right:16px; z-index:10; display:none;
    cursor:pointer; font:11px 'Courier New',monospace; color:var(--muted);
    background:transparent; border:1px solid rgba(147,160,191,.3);
    border-radius:6px; padding:4px 12px; letter-spacing:.15em; }
  #btnReplay.show{ display:block; }
  #btnReplay:hover{ color:var(--warm); border-color:var(--warm); }

  @media (prefers-reduced-motion:reduce){
    .g-fever,.g-hurt,.fire{ animation:none; }
  }
</style>
</head>
<body>
<div id="head">ISLAND SAMPLE · 生命徵象＝字體 · 派系＝引力</div>
<div id="day">DAY 7</div>
<div id="stage"></div>
<div id="narr"><div id="ntext"></div><span id="nnext">▼</span></div>
<button id="btnReplay">↺ 重來</button>

<script>
'use strict';
const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
const stage = document.getElementById('stage');
const CX = () => innerWidth / 2, CY = () => innerHeight * 0.42;

/* ── 佈景 ── */
function scenery(t, x, y, size, cls) {
  const s = document.createElement('span');
  s.className = 'scenery' + (cls ? ' ' + cls : '');
  s.textContent = t; s.style.fontSize = size + 'px';
  s.style.transform = `translate(${x}px, ${y}px)`;
  stage.appendChild(s); return s;
}
scenery('～～～～～～～～～～～～～～', 0, innerHeight * 0.86, 20);
scenery('～～～～～～～～～～', innerWidth * 0.4, innerHeight * 0.92, 20);
scenery('木', innerWidth * 0.12, innerHeight * 0.18, 30);
scenery('木 木', innerWidth * 0.78, innerHeight * 0.14, 26);
const fire1 = scenery('火', 0, 0, 24, 'fire');
const fire2 = scenery('火', 0, 0, 24, 'fire');

/* ── 倖存者:生命徵象 = 字體 ── */
const STATES = {
  ok:     { w: 600, blur: 0,   op: 1,   tint: '#cdd3e0', label: '' },
  hungry: { w: 300, blur: 0,   op: 1,   tint: '#b8bfcf', label: '飢餓' },
  fever:  { w: 400, blur: 1.4, op: .95, tint: '#d8b8b8', label: '發燒', cls: 'g-fever' },
  hurt:   { w: 500, blur: 0,   op: 1,   tint: '#e08585', label: '受傷', cls: 'g-hurt' },
  weak:   { w: 100, blur: .6,  op: .55, tint: '#9aa3b8', label: '虛弱' },
};
const actors = {};
function makeActor(key, glyph, name, x, y) {
  const el = document.createElement('div');
  el.className = 'actor';
  el.innerHTML = `<span class="glyph">${glyph}</span><span class="tag"></span>`;
  stage.appendChild(el);
  actors[key] = { key, el, g: el.querySelector('.glyph'),
    tag: el.querySelector('.tag'), name,
    x, y, vx: 0, vy: 0, phase: Math.random() * 6, state: 'ok' };
  setState(key, 'ok');
  return actors[key];
}
function setState(key, st) {
  const a = actors[key], s = STATES[st];
  a.state = st;
  a.g.style.fontWeight = s.w;
  a.g.style.filter = s.blur && !reduced ? `blur(${s.blur}px)` : '';
  a.g.style.opacity = s.op;
  a.g.style.color = s.tint;
  a.g.className = 'glyph' + (s.cls && !reduced ? ' ' + s.cls : '');
  a.tag.textContent = a.name + (s.label ? ' · ' + s.label : '');
  a.tag.style.color = st === 'hurt' || st === 'fever' ? s.tint : 'var(--faint)';
}
makeActor('chuan', '船', '老船長', CX() - 60,  CY() - 40);
makeActor('yan',   '岩', '阿岩',   CX() + 70,  CY() - 20);
makeActor('ye',    '葉', '小葉',   CX() - 20,  CY() + 60);
makeActor('mi',    '米', '阿米',   CX() + 20,  CY() - 80);
makeActor('yi',    '醫', '醫生',   CX() - 90,  CY() + 30);

/* ── 人際引力:信任=吸引 衝突=排斥 ── */
const KEYS = Object.keys(actors);
const aff = {};                                  // 'a|b' → 引力值
const pk = (a, b) => a < b ? a + '|' + b : b + '|' + a;
KEYS.forEach(a => KEYS.forEach(b => { if (a < b) aff[pk(a, b)] = 0.3; }));
function setAff(a, b, v) { aff[pk(a, b)] = v; }
function setAffAll(target, v, except = []) {
  KEYS.forEach(k => { if (k !== target && !except.includes(k)) setAff(k, target, v); });
}

function loop() {
  const now = performance.now();
  for (let i = 0; i < KEYS.length; i++) {
    const A = actors[KEYS[i]];
    let fx = 0, fy = 0;
    for (let j = 0; j < KEYS.length; j++) {
      if (i === j) continue;
      const B = actors[KEYS[j]];
      const dx = B.x - A.x, dy = B.y - A.y;
      const d = Math.hypot(dx, dy) || 1;
      const f = aff[pk(A.key, B.key)];
      fx += (dx / d) * f * 0.012;                // 引力/斥力
      fy += (dy / d) * f * 0.012;
      if (d < 64) { fx -= (dx / d) * 0.05; fy -= (dy / d) * 0.05; }  // 個人空間
    }
    fx += (CX() - A.x) * 0.00004;                // 微弱的營地向心力
    fy += (CY() - A.y) * 0.00004;
    A.vx = (A.vx + fx) * 0.93;
    A.vy = (A.vy + fy) * 0.93;
    A.x += A.vx; A.y += A.vy;
    A.x = Math.max(50, Math.min(innerWidth - 60, A.x));
    A.y = Math.max(70, Math.min(innerHeight * 0.72, A.y));
    const bob = Math.sin(now / 750 + A.phase) * 1.6;
    A.el.style.transform = `translate(${A.x - 19}px, ${A.y + bob}px)`;
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ── 旁白 ── */
const ntext = document.getElementById('ntext');
const nnext = document.getElementById('nnext');
let skipFlag = false;
async function say(text) {
  skipFlag = false; nnext.classList.remove('show');
  ntext.textContent = '';
  for (const ch of text) {
    ntext.textContent += ch;
    if (!skipFlag) {
      const P = { '，': 150, '。': 300, '——': 180, '？': 260 };
      await new Promise(r => setTimeout(r, reduced ? 0 : 30 + (P[ch] ?? 0)));
    }
  }
  nnext.classList.add('show');
}

/* ── 劇本（佔位）── */
const BEATS = [
  async () => { setState('chuan','hungry'); setState('yan','hungry');
    setState('mi','hungry'); setState('yi','hungry');
    await say('第七天。淡水，剩兩壺。所有人的字，都比七天前細了一號。'); },

  async () => { setState('ye', 'fever');
    await say('小葉開始發燒。她的名字在視線裡，有點對不了焦。'); },

  async () => { setAffAll('yan', -0.9);
    await say('阿岩的背包裡，被翻出半壺私藏的水。沒有人說話——但你看，人群正在慢慢離他遠去。'); },

  async () => { setAff('chuan','ye', 1.2); setAff('chuan','mi', 0.8);
    setAff('chuan','yi', 0.9);
    await say('老船長把自己的口糧分了。分給了燒得最重的小葉。有些人，朝他靠近了半步。'); },

  async () => { setAff('mi','yan', 1.3); setAff('mi','chuan', -0.5);
    setAff('mi','ye', -0.3); setAff('mi','yi', -0.3);
    await say('夜裡，阿米忽然說:「也許阿岩才是對的。省著喝的人，才活得到船來。」——他的字，開始往阿岩那邊漂。'); },

  async () => {
    setAff('chuan','yan', -1.4); setAff('chuan','mi', -1.0);
    setAff('ye','yan', -1.0); setAff('ye','mi', -0.8);
    setAff('yi','yan', -0.8); setAff('yi','mi', -0.6);
    setAff('yan','mi', 1.4); setAff('chuan','ye', 1.4); setAff('yi','ye', 1.0);
    setAff('yi','chuan', 1.0);
    await say('爭吵。誰也沒有動手。但等吵完，已經沒有人站在中間了。'); },

  async () => { await new Promise(r => setTimeout(r, reduced ? 0 : 1800));
    const g1 = ['yan','mi'], g2 = ['chuan','ye','yi'];
    const c1 = { x: g1.reduce((s,k)=>s+actors[k].x,0)/g1.length,
                 y: g1.reduce((s,k)=>s+actors[k].y,0)/g1.length };
    const c2 = { x: g2.reduce((s,k)=>s+actors[k].x,0)/g2.length,
                 y: g2.reduce((s,k)=>s+actors[k].y,0)/g2.length };
    fire1.style.transform = `translate(${c1.x - 10}px, ${c1.y + 46}px)`;
    fire2.style.transform = `translate(${c2.x - 10}px, ${c2.y + 46}px)`;
    fire1.classList.add('lit'); fire2.classList.add('lit');
    await say('那天晚上，沙灘上點起了兩堆火。'); },

  async () => { setState('chuan','weak'); setState('yan','hungry');
    setState('mi','hungry'); setState('yi','hungry');
    await say('島沒有分裂。人先分裂了。——第八天，待續。');
    document.getElementById('btnReplay').classList.add('show');
    document.getElementById('day').textContent = 'DAY 7 · 完'; },
];
let beat = -1, busy = false;
async function advance() {
  if (busy) { skipFlag = true; return; }
  beat++; if (beat >= BEATS.length) return;
  busy = true; await BEATS[beat](); busy = false;
}
addEventListener('pointerdown', e => {
  if (e.target.closest('#btnReplay')) return; advance();
});
addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); advance(); }
});
document.getElementById('btnReplay').onclick = () => location.reload();
advance();
</script>
</body>
</html>
